apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: devops-kb
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: devops-knowledge-base
data:
  OPENAI_MODEL: "gpt-4o"
  EMBEDDING_MODEL: "text-embedding-3-small"
  CORS_ORIGINS: '["https://kb.example.com"]'
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "200"
