# -- Global settings
global:
  # -- Container image registry
  imageRegistry: "ghcr.io/your-org"

# -- Namespace to deploy into (created if createNamespace is true)
namespace: devops-kb
createNamespace: true

# -- ServiceAccount configuration
serviceAccount:
  create: true
  name: devops-kb
  annotations: {}

# --------------------------------------------------------------------------- #
#  Backend
# --------------------------------------------------------------------------- #
backend:
  replicaCount: 2

  image:
    repository: devops-kb-backend
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8000

  # -- ConfigMap values
  config:
    OPENAI_MODEL: "gpt-4o"
    EMBEDDING_MODEL: "text-embedding-3-small"
    CORS_ORIGINS: '["https://kb.example.com"]'
    CHUNK_SIZE: "1000"
    CHUNK_OVERLAP: "200"

  # -- Secret values (use external-secrets in production)
  secrets:
    OPENAI_API_KEY: "REPLACE_ME"
    SUPABASE_URL: "REPLACE_ME"
    SUPABASE_KEY: "REPLACE_ME"

  # -- Existing secret name (overrides secrets above if set)
  existingSecret: ""

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

  probes:
    liveness:
      path: /api/v1/health
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /api/v1/health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      path: /api/v1/health
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 12

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  nodeSelector: {}
  tolerations: []
  affinity: {}

# --------------------------------------------------------------------------- #
#  Frontend
# --------------------------------------------------------------------------- #
frontend:
  replicaCount: 2

  image:
    repository: devops-kb-frontend
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  nodeSelector: {}
  tolerations: []
  affinity: {}

# --------------------------------------------------------------------------- #
#  Ingress
# --------------------------------------------------------------------------- #
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: kb.example.com
  tls:
    enabled: true
    secretName: devops-kb-tls

# --------------------------------------------------------------------------- #
#  Network Policy
# --------------------------------------------------------------------------- #
networkPolicy:
  enabled: true
  # -- Namespace where the ingress controller runs
  ingressNamespace: ingress-nginx
