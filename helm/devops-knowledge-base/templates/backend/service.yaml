apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-kb.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devops-kb.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "devops-kb.backend.selectorLabels" . | nindent 4 }}
