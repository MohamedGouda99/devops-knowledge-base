apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-kb.fullname" . }}-backend-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devops-kb.backend.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.backend.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
