apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-knowledge-base-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devops-knowledge-base
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devops-knowledge-base

  source:
    repoURL: https://github.com/your-org/devops-knowledge-base.git
    targetRevision: main
    path: helm/devops-knowledge-base
    helm:
      valueFiles:
        - ../../argocd/overlays/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-kb

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics

  revisionHistoryLimit: 10
